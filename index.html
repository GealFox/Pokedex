<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Pokédex Visión Real Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --pokedex-red: #dc0a2d;
            --pokedex-dark-red: #8b0000;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        *, *::before, *::after {
            box-sizing: inherit;
        }

        .pokedex-container {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
            width: 92%;
            max-width: 380px;
            height: fit-content;
            max-height: 95%;
            background-color: var(--pokedex-red);
            border-radius: 20px;
            border: 4px solid #1a1a1a;
            box-shadow: 0 8px 0 var(--pokedex-dark-red), 0 15px 30px rgba(0,0,0,0.8);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .top-lights {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 2px;
        }

        .big-blue-light {
            width: 45px;
            height: 45px;
            background: #222;
            border: 4px solid #eee;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .light-on {
            background: radial-gradient(circle, #85d7ff 0%, #51adff 100%);
            box-shadow: 0 0 20px #51adff;
        }

        .small-light { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.3); }

        .screen-border {
            background-color: #dedede;
            padding: 15px 15px 30px 15px;
            border-radius: 10px 10px 10px 35px;
            border: 3px solid #333;
        }

        .main-screen-container {
            background-color: #000;
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 5px;
            border: 4px solid #444;
            position: relative;
            overflow: hidden;
        }

        .screen-content-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            display: none;
            background-color: black;
        }

        #camera-feed, #photo-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
            padding: 0;
        }

        #photo-preview { z-index: 10; display: none; }

        .anim-on { display: block !important; animation: crt-on 0.4s ease-out forwards; }
        .anim-off { animation: crt-off 0.5s ease-in forwards !important; }

        @keyframes crt-on {
            0% { transform: scaleY(0.005) scaleX(0); background: white; }
            50% { transform: scaleY(0.005) scaleX(1); background: white; }
            100% { transform: scaleY(1) scaleX(1); }
        }

        @keyframes crt-off {
            0% { transform: scaleY(1) scaleX(1); }
            40% { transform: scaleY(0.005) scaleX(1); background: white; filter: brightness(3); }
            100% { transform: scaleY(0) scaleX(0); background: white; filter: brightness(10); display: none; }
        }

        .scanning-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(81, 173, 255, 0.9);
            box-shadow: 0 0 15px #51adff;
            animation: scan 1.5s linear infinite;
            display: none;
            z-index: 20;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .info-panel {
            background-color: #51adff;
            border: 3px solid #333;
            padding: 10px;
            min-height: 85px;
            border-radius: 5px;
            color: #111;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            line-height: 1.4;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4);
            overflow-y: auto;
            word-wrap: break-word;
        }

        .panel-off { background-color: #1a4a75; color: #0a253d; opacity: 0.6; }

        .controls { display: flex; justify-content: space-between; align-items: center; }

        .btn-scan {
            background-color: #333;
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 4px solid #111;
            box-shadow: 0 4px 0 #000;
            text-transform: uppercase;
        }

        .btn-scan:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        .btn-scan:disabled { opacity: 0.4; }

        .power-btn {
            width: 45px;
            height: 45px;
            background: #600;
            border: 3px solid #222;
            border-radius: 50%;
            color: #fff;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 3px 0 #000;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .power-btn.on { background: #0f0; color: #040; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }

        .d-pad { display: grid; grid-template-columns: repeat(3, 22px); grid-template-rows: repeat(3, 22px); }
        .d-btn { background: #333; border: 1px solid #000; }
    </style>
</head>
<body>

<div class="pokedex-container">
    <div class="top-lights">
        <div class="big-blue-light" id="status-light"></div>
        <div class="small-light bg-red-600"></div>
        <div class="small-light bg-yellow-400"></div>
        <div class="small-light bg-green-500"></div>
    </div>

    <div class="screen-border">
        <div class="main-screen-container">
            <div class="screen-content-wrapper" id="screen-wrapper">
                <video id="camera-feed" autoplay playsinline muted></video>
                <img id="photo-preview" src="" alt="Capture">
                <div class="scanning-line" id="scanner"></div>
            </div>
        </div>
    </div>

    <div class="info-panel panel-off" id="result-display">
        SISTEMA APAGADO.<br>USE BOTÓN POWER.
    </div>

    <div class="controls px-1 pb-1">
        <div class="flex flex-col items-center gap-2">
            <button id="power-btn" class="power-btn">ON</button>
            <div class="d-pad">
                <div></div><div class="d-btn rounded-t"></div><div></div>
                <div class="d-btn rounded-l"></div><div class="d-btn"></div><div class="d-btn rounded-r"></div>
                <div></div><div class="d-btn rounded-b"></div><div></div>
            </div>
        </div>
        
        <button id="scan-btn" class="btn-scan" disabled>Escanear</button>

        <div class="flex flex-col gap-2">
            <div class="w-12 h-2 bg-red-900 rounded"></div>
            <div class="w-12 h-2 bg-blue-900 rounded"></div>
            <div class="w-12 h-2 bg-green-900 rounded"></div>
        </div>
    </div>
</div>

</html>
