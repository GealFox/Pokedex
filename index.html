
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Pokédex Visión Real Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --pokedex-red: #dc0a2d;
            --pokedex-dark-red: #8b0000;
        }

        /* RESET TOTAL */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        *, *::before, *::after {
            box-sizing: inherit;
        }

        /* CENTRADO ABSOLUTO */
        .pokedex-container {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
            
            width: 92%;
            max-width: 380px;
            height: fit-content;
            max-height: 95%;
            
            background-color: var(--pokedex-red);
            border-radius: 20px;
            border: 4px solid #1a1a1a;
            box-shadow: 0 8px 0 var(--pokedex-dark-red), 0 15px 30px rgba(0,0,0,0.8);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        /* Componentes Superiores */
        .top-lights {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 2px;
        }

        .big-blue-light {
            width: 45px;
            height: 45px;
            background: #222;
            border: 4px solid #eee;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .light-on {
            background: radial-gradient(circle, #85d7ff 0%, #51adff 100%);
            box-shadow: 0 0 20px #51adff;
        }

        .small-light { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.3); }

        /* Contenedor del Visor */
        .screen-border {
            background-color: #dedede;
            padding: 15px 15px 30px 15px;
            border-radius: 10px 10px 10px 35px;
            border: 3px solid #333;
        }

        .main-screen-container {
            background-color: #000;
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 5px;
            border: 4px solid #444;
            position: relative;
            overflow: hidden;
        }

        /* Animación CRT y Contenido */
        .screen-content-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            display: none;
            background-color: black;
        }

        #camera-feed, #photo-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
            padding: 0;
        }

        #photo-preview { z-index: 10; display: none; }

        /* Clases para animación de Encendido / Apagado */
        .anim-on { display: block !important; animation: crt-on 0.4s ease-out forwards; }
        .anim-off { animation: crt-off 0.5s ease-in forwards !important; }

        @keyframes crt-on {
            0% { transform: scaleY(0.005) scaleX(0); background: white; }
            50% { transform: scaleY(0.005) scaleX(1); background: white; }
            100% { transform: scaleY(1) scaleX(1); }
        }

        @keyframes crt-off {
            0% { transform: scaleY(1) scaleX(1); }
            40% { transform: scaleY(0.005) scaleX(1); background: white; filter: brightness(3); }
            100% { transform: scaleY(0) scaleX(0); background: white; filter: brightness(10); display: none; }
        }

        .scanning-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(81, 173, 255, 0.9);
            box-shadow: 0 0 15px #51adff;
            animation: scan 1.5s linear infinite;
            display: none;
            z-index: 20;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* Panel de Información */
        .info-panel {
            background-color: #51adff;
            border: 3px solid #333;
            padding: 10px;
            min-height: 85px;
            border-radius: 5px;
            color: #111;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            line-height: 1.4;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4);
            overflow-y: auto;
        }

        .panel-off { background-color: #1a4a75; color: #0a253d; opacity: 0.6; }

        /* Controles Inferiores */
        .controls { display: flex; justify-content: space-between; align-items: center; }

        .btn-scan {
            background-color: #333;
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 4px solid #111;
            box-shadow: 0 4px 0 #000;
            text-transform: uppercase;
        }

        .btn-scan:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        .btn-scan:disabled { opacity: 0.4; }

        .power-btn {
            width: 45px;
            height: 45px;
            background: #600;
            border: 3px solid #222;
            border-radius: 50%;
            color: #fff;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 3px 0 #000;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .power-btn.on { background: #0f0; color: #040; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }

        .d-pad { display: grid; grid-template-columns: repeat(3, 22px); grid-template-rows: repeat(3, 22px); }
        .d-btn { background: #333; border: 1px solid #000; }
    </style>
</head>
<body>

<div class="pokedex-container">
    <div class="top-lights">
        <div class="big-blue-light" id="status-light"></div>
        <div class="small-light bg-red-600"></div>
        <div class="small-light bg-yellow-400"></div>
        <div class="small-light bg-green-500"></div>
    </div>

    <div class="screen-border">
        <div class="main-screen-container">
            <div class="screen-content-wrapper" id="screen-wrapper">
                <video id="camera-feed" autoplay playsinline muted></video>
                <img id="photo-preview" src="" alt="Capture">
                <div class="scanning-line" id="scanner"></div>
            </div>
        </div>
    </div>

    <div class="info-panel panel-off" id="result-display">
        SISTEMA APAGADO.<br>USE BOTÓN POWER.
    </div>

    <div class="controls px-1 pb-1">
        <div class="flex flex-col items-center gap-2">
            <button id="power-btn" class="power-btn">ON</button>
            <div class="d-pad">
                <div></div><div class="d-btn rounded-t"></div><div></div>
                <div class="d-btn rounded-l"></div><div class="d-btn"></div><div class="d-btn rounded-r"></div>
                <div></div><div class="d-btn rounded-b"></div><div></div>
            </div>
        </div>
        
        <button id="scan-btn" class="btn-scan" disabled>Escanear</button>

        <div class="flex flex-col gap-2">
            <div class="w-12 h-2 bg-red-900 rounded"></div>
            <div class="w-12 h-2 bg-blue-900 rounded"></div>
            <div class="w-12 h-2 bg-green-900 rounded"></div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('camera-feed');
    const photoPreview = document.getElementById('photo-preview');
    const screenWrapper = document.getElementById('screen-wrapper');
    const scanBtn = document.getElementById('scan-btn');
    const powerBtn = document.getElementById('power-btn');
    const resultDisplay = document.getElementById('result-display');
    const scanner = document.getElementById('scanner');
    const statusLight = document.getElementById('status-light');

    let stream = null;
    let isOn = false;

    function playSound(freq, type = 'square') {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    async function togglePower() {
        if (!isOn) {
            try {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } }, audio: false });
                } catch (e) {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                }

                video.srcObject = stream;
                isOn = true;
                
                screenWrapper.classList.remove('anim-off');
                screenWrapper.classList.add('anim-on');
                statusLight.classList.add('light-on');
                powerBtn.classList.add('on');
                powerBtn.innerText = "OFF";
                scanBtn.disabled = false;
                resultDisplay.classList.remove('panel-off');
                
                resultDisplay.innerHTML = "POKÉDEX ESTRICTA.<br>ENERGÍA CONECTADA.";
                playSound(600);
                hablar("Pokédex en línea.");

            } catch (err) {
                resultDisplay.innerHTML = "CÁMARA DENEGADA POR EL SISTEMA.";
            }
        } else {
            playSound(300);
            screenWrapper.classList.remove('anim-on');
            screenWrapper.classList.add('anim-off');
            scanBtn.disabled = true;
            
            setTimeout(() => {
                if (stream) stream.getTracks().forEach(t => t.stop());
                video.srcObject = null;
                photoPreview.style.display = 'none';
                isOn = false;
                statusLight.classList.remove('light-on');
                powerBtn.classList.remove('on');
                powerBtn.innerText = "ON";
                resultDisplay.classList.add('panel-off');
                resultDisplay.innerHTML = "SISTEMA APAGADO.<br>USE BOTÓN POWER.";
            }, 500);
        }
    }

    function hablar(t) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t); 
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
    }

    async function getPokemonData(pokemonName) {
        try {
            let query = pokemonName.toLowerCase().replace(/[^a-z0-9-]/g, '');
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${query}`);
            if (!res.ok) throw new Error("No encontrado");
            
            const data = await res.json();
            
            let descripcion = "Datos perdidos.";
            for (let entry of data.flavor_text_entries) {
                if (entry.language.name === "es") {
                    descripcion = entry.flavor_text.replace(/\n|\f/g, ' '); 
                    break;
                }
            }
            let nombre_real = data.names.find(n => n.language.name === "es")?.name || data.name;
            return { nombre: nombre_real, descripcion: descripcion, id: data.id };
        } catch (e) {
            throw e; 
        }
    }

    scanBtn.addEventListener('click', async () => {
        if (!isOn || scanBtn.disabled) return;

        if (!video.videoWidth) {
            resultDisplay.innerHTML = "CÁMARA NO LISTA.";
            return;
        }

        scanBtn.disabled = true;
        scanner.style.display = 'block';
        resultDisplay.innerHTML = "ANALIZANDO OBJETIVO...";
        
        const tempCanvas = document.createElement('canvas');
        const ctx = tempCanvas.getContext('2d');
        const MAX_WIDTH = 600; 
        const scale = MAX_WIDTH / video.videoWidth;
        tempCanvas.width = MAX_WIDTH; 
        tempCanvas.height = video.videoHeight * scale;
        ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
        
        const b64 = tempCanvas.toDataURL('image/jpeg', 0.7);
        const base64Data = b64.split(',')[1];

        photoPreview.src = b64;
        photoPreview.style.display = 'block'; 
        playSound(1000);

        try {
            const promptEstricto = `
                Eres una máquina Pokédex estricta. 
                Si en la imagen ves un Pokémon (peluche, dibujo o persona disfrazada), responde ÚNICAMENTE con el nombre del Pokémon en minúsculas (ejemplo: pikachu).
                Si la imagen muestra CUALQUIER OTRA COSA, responde ÚNICAMENTE con: ninguno
            `;

            // 🔥 BACKEND VERCEL - AJUSTADO PARA LEER ERRORES
            const res = await fetch("/api/scan", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: promptEstricto },
                            { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                        ]
                    }]
                })
            });
            
            const dataAPI = await res.json();

            // Atrapamos el error si Google le mandó un error a Vercel
            if (!res.ok || dataAPI.error) {
                throw new Error(dataAPI.error?.message || "Error en backend Vercel");
            }
            
            const aiRespuesta = dataAPI.candidates?.[0]?.content?.parts?.[0]?.text?.trim().toLowerCase() || "";

            if (aiRespuesta.includes("ninguno") || aiRespuesta === "") {
                playSound(200);
                resultDisplay.innerHTML = "OBJETO DESCONOCIDO.<br>NO SE DETECTÓ NINGÚN POKÉMON.";
                hablar("Objeto no reconocido. No es un Pokémon.");
            } else {
                resultDisplay.innerHTML = `DETECTADO: ${aiRespuesta.toUpperCase()}<br>BUSCANDO DATOS...`;
                
                try {
                    const pokemonData = await getPokemonData(aiRespuesta);
                    let idString = pokemonData.id.toString().padStart(3, '0');
                    resultDisplay.innerHTML = `Nº ${idString} ${pokemonData.nombre.toUpperCase()}<br><br>${pokemonData.descripcion.toUpperCase()}`;
                    playSound(800);
                    hablar(`${pokemonData.nombre}. ${pokemonData.descripcion}`);
                } catch(e) {
                    resultDisplay.innerHTML = `INFO NO OFICIAL SOBRE:<br>${aiRespuesta.toUpperCase()}`;
                }
            }

        } catch (e) {
            console.error(e);
            console.error("ERROR COMPLETO:", e);
resultDisplay.innerHTML = `ERROR:<br>${e.message.toUpperCase()}`;
            playSound(200);
            photoPreview.style.display = 'none'; 
        } finally {
            scanner.style.display = 'none';
            setTimeout(() => scanBtn.disabled = false, 1500);
        }
    });

    photoPreview.addEventListener('click', () => {
        if (isOn && !scanBtn.disabled) {
            photoPreview.style.display = 'none';
            resultDisplay.innerHTML = "CÁMARA REACTIVADA.";
        }
    });

    powerBtn.addEventListener('click', togglePower);
</script>

</body>
</html>
